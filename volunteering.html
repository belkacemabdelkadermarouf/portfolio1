<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitions & Hackathons | Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="events-body">

<header class="hidden">
<nav class="navbar">
  <h2 class="logo">Belkacem</h2>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="projects.html">Projects</a></li>
    <li><a href="recognition.html">recognition</a></li>
    <li><a href="competetions.html">competetions</a></li>
    <li><a href="volunteering.html">volunteers</a></li>
    <li><a href="internship.html">internship</a></li>




  </ul>
</nav>

</header>


<main class="events-page">
    <section id="competitions-section">
        <h1 class="section-title">Volunteering</h1>
        
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterEvents('all', this)">All</button>
            <button class="filter-btn" onclick="filterEvents('Scientific club', this)">Scientific club</button>
            <button class="filter-btn" onclick="filterEvents('Events', this)">Events</button>
            <button class="filter-btn" onclick="filterEvents('Media & Marketing', this)">Media & Marketing</button>
        </div>

        <div class="events-grid">
                
            <div class="event-card" data-category="Scientific club" onclick="openModal('comp1')">
                    <div class="event-banner">
                        <img src="assets/ISC.png" alt="Comp 1">
                        <span class="badge winner">Scientific club</span>
                    </div>
                    <div class="event-info">
                        <h3>Inelectroncis student club</h3>
                        <p class="event-meta">2023 - now • Boumerdes</p>
                        <div class="impact-evidence">

                            <div class="evidence-box" onclick="event.stopPropagation(); showImage('assets/proj1.jpg')">
                             <button class="details-btn"
                              onclick="window.location.href='inelectronics.html'">
                               View Details <i class="fa-solid fa-circle-info"></i>
                             </button>
   
                            </div>
                        </div>
                    </div>
                </div>



            <div class="event-card" data-category="ideathon" onclick="openModal('comp1')">
                <div class="event-banner">
                    <img src="assets/bunian.jpg" alt="Comp 1">
                    <span class="badge winner">non-profit</span>
                </div>

                <div class="event-info">
                    <h3>Atm - Bunian </h3>
                    <p class="event-meta">2025 • remote</p>
                    <div class="impact-evidence">
                        <div class="evidence-box" onclick="event.stopPropagation(); showImage('assets/bunian1.jpg')">
                            <button class="details-btn" onclick="window.location.href='bunian.html'">
                                View Details <i class="fa-solid fa-circle-info"></i>
                            </button>
                            </div>
                    </div>
                </div>
            </div>


            <div class="event-card" data-category="hackathon" onclick="openModal('comp1')">
                    <div class="event-banner">
                        <img src="assets/dishack1.webp" alt="Comp 1">
                        <span class="badge winner">Participant</span>
                    </div>

                    <div class="event-info">
                        <h3>Dishack - Hackthon </h3>
                        <p class="event-meta">2025 • Algiers</p>
                        <div class="impact-evidence">

                            <div class="evidence-box" onclick="event.stopPropagation(); showImage('assets/proj1.jpg')">
                             <button class="details-btn"
                              onclick="window.location.href='dishack.html'">
                               View Details <i class="fa-solid fa-circle-info"></i>
                             </button>
   
                            </div>
                        </div>
                    </div>
                </div>












            </div>
        </section>


    </main>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <div id="imageLightbox" class="lightbox" onclick="this.style.display='none'">
        <img id="lightboxImg" src="">
    </div>

    <script src="script.js"></script>
</body>
</html>
